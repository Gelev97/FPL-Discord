name: FPL Daily Intelligence Report

on:
  schedule:
    # Runs at 18:00 UTC every day
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run FPL Intelligence Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        FPL_TEAM_ID: ${{ secrets.FPL_TEAM_ID }}
      run: python main.py

    - name: Commit and Push Memory
      run: |
        git config --global user.name "FPL-Bot"
        git config --global user.email "fpl-bot@github.com"
        git add memory.json
        git commit -m "Update FPL memory [skip ci]" || echo "No changes to commit"
        git push
